apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: blogapp-kv-secret-provider
  namespace: blogapp
spec:
  provider: azure
  secretObjects: 
    - secretName: blogapp-db-secret
      type: Opaque
      data:
        - objectName: postgres-password # اسم السر جوه Key Vault
          key: POSTGRES_PASSWORD        # اسم المفتاح جوه كوبرنيتز
  parameters:
    usePodIdentity: "false" # تأكد إن دي مش موجودة أو بـ false
    useVMManagedIdentity: "true" # رجع دي لـ true
    userAssignedIdentityID: "aaa7cd4e-0d35-4910-abbb-466441792f8b" # الـ ClientID اللي إنت جبته
    keyvaultName: "blogapp-kv-fsx3"
    tenantId: "9610af74-00c1-41f7-bbef-348bc8f2738c"
    objects: |
      array:
        - |
          objectName: postgres-password
          objectType: secret
