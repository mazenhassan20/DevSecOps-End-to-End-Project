apiVersion: apps/v1
kind: Deployment
metadata:
  name: blogapp-backend
  namespace: blogapp
  labels:
    app.kubernetes.io/name: blogapp-backend
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: blogapp-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: blogapp-backend
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for blogapp-db:5432..."
              until nc -z blogapp-db 5432; do
                sleep 3
              done
      containers:
        - name: backend
          image: blogappregistry2026.azurecr.io/backend:1fa6f3ab0c6d6b1db547e59f9a7474af78b34f5e
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
            - name: DB_HOST
              value: "blogapp-db"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "blogapp_user"
            - name: DB_NAME
              value: "blogapp_db"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: blogapp-db-secret
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "blogapp-kv-secret-provider"
---
apiVersion: v1
kind: Service
metadata:
  name: blogapp-backend
  namespace: blogapp
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: blogapp-backend
  ports:
    - port: 5000
      targetPort: 5000
