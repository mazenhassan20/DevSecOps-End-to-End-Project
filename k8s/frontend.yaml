apiVersion: apps/v1
kind: Deployment
metadata:
  name: blogapp-frontend
  namespace: blogapp
  labels:
    app.kubernetes.io/name: blogapp-frontend
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: blogapp-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: blogapp-frontend
    spec:
      automountServiceAccountToken: false
      containers:
        - name: frontend
          image: blogappregistry2026.azurecr.io/frontend:1fa6f3ab0c6d6b1db547e59f9a7474af78b34f5e
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 101 
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: blogapp-frontend
  namespace: blogapp
spec:
  type: LoadBalancer 
  selector:
    app.kubernetes.io/name: blogapp-frontend
  ports:
    - port: 80
      targetPort: 8080
