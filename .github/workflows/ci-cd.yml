name: DevSecOps Secure CI Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'terraform/**'
      - 'k8s/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'terraform/**'
      - 'k8s/**'

jobs:
  gitleaks_scan:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  security_scan:
    name: Infrastructure & Code Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Checkov
        run: pip install checkov==3.2.19

      - name: Run Checkov
        run: |
          checkov -d . --soft-fail --skip-download --quiet --config-file ./.github/checkov-ci.yaml
  build_and_push:
    name: Build, Scan and Push Images
    needs: security_scan 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
     
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Login to Azure Container Registry
        run: az acr login --name blogappregistry2026

      - name: Build Backend Image
        run: docker build -t blogappregistry2026.azurecr.io/backend:${{ github.sha }} ./backend

      - name: Scan Backend Image with Trivy (Security Container Scan)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'blogappregistry2026.azurecr.io/backend:${{ github.sha }}'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Push Backend Image to ACR
        run: docker push blogappregistry2026.azurecr.io/backend:${{ github.sha }}

      - name: Build Frontend Image
        run: docker build -t blogappregistry2026.azurecr.io/frontend:${{ github.sha }} ./frontend

      - name: Scan Frontend Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'blogappregistry2026.azurecr.io/frontend:${{ github.sha }}'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Push Frontend Image to ACR
        run: docker push blogappregistry2026.azurecr.io/frontend:${{ github.sha }}

      - name: Update Image Tags in K8s Manifests
        run: |

          sed -i 's|blogappregistry2026.azurecr.io/backend:.*|blogappregistry2026.azurecr.io/backend:${{ github.sha }}|g' ./k8s/backend.yaml
          
          sed -i 's|blogappregistry2026.azurecr.io/frontend:.*|blogappregistry2026.azurecr.io/frontend:${{ github.sha }}|g' ./k8s/frontend.yaml

      - name: Commit and Push Manifest Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ./k8s/*.yaml
          git commit -m "Automated deployment: update image tags to ${{ github.sha }} [skip ci]"
          git push origin main
